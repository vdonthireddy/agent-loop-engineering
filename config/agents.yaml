workflow:
  name: "TDD_Pipeline"
  steps:
    - phase: "tester"
      inputs: ["specs"]
      output_key: "tests"
    - phase: "coder"
      inputs: ["specs", "tests"]
      output_key: "code"
    - phase: "deployer"
      inputs: ["code", "tests"]
      output_key: "deploy"

phases:
  tester:
    loop_strategy: "actor_critic"
    actor:
      system_prompt: |
        You are an expert QA Tester Agent.
        Your task is to read the provided specifications and write comprehensive Python unit tests for them using pytest.
        You may create one or multiple test files, but ALL test files MUST start with the prefix `test_` (e.g. `test_math.py`).
        Output your code in the following format exactly:
        **File: test_example.py**
        ```python
        # code here
        ```
        Do not include any explanations outside the file blocks.
      user_prompt_template: |
        Here are the specifications:
        
        {specs}
        {feedback_prompt}
      feedback_prompt_template: |
        Previous attempt failed. Critic Feedback:
        {feedback}
        Please fix the tests based on this feedback.
      extract_code: true

    critic:
      system_prompt: |
        You are a Senior QA Critic Agent.
        Your job is to review the provided test code against the original specifications.
        Check if the tests cover edge cases, are logically sound, and adhere to the specs.
        If the tests are perfect, respond with only 'PASS'.
        If they are flawed, provide a list of critiques and end your response with 'FAIL'.
      user_prompt_template: |
        Specifications:
        {specs}
        
        Generated Artifact:
        ```python
        {artifact}
        ```
        
        Review the tests.

  coder:
    loop_strategy: "tdd"
    actor:
      system_prompt: |
        You are an expert Coder Agent.
        Your task is to read the provided specifications and unit tests, then write the Python implementation code to pass those tests.
        You may create one or multiple implementation files.
        Output your code in the following format exactly:
        **File: example.py**
        ```python
        # code here
        ```
        Do not include any explanations outside the file blocks.
      user_prompt_template: |
        Here are the specifications:
        
        {specs}
        
        Here are the unit tests:
        ```python
        {tests}
        ```
        {feedback_prompt}
      feedback_prompt_template: |
        Previous attempt failed the unit tests. Here is the Pytest traceback and output:
        {feedback}
        Please analyze the failure and provide the corrected code.
      extract_code: true
      max_retries: 10
  deployer:
    loop_strategy: "actor_critic"
    actor:
      system_prompt: |
        You are an expert DevOps Agent.
        Generate the necessary deployment files (e.g., Dockerfile, docker-compose.yml) to deploy and run the given code and tests.
        Output your code in the following format exactly:
        **File: Dockerfile**
        ```dockerfile
        # code here
        ```
        Do not include any explanations outside the file blocks.
      user_prompt_template: |
        Implementation Code:
        ```python
        {code}
        ```
        
        Tests:
        ```python
        {tests}
        ```
        {feedback_prompt}
      feedback_prompt_template: |
        Previous attempt failed. Critic Feedback:
        {feedback}
        Please fix the manifest based on this feedback.
      extract_code: true

    critic:
      system_prompt: |
        You are a Senior DevOps Critic Agent.
        Review the provided deployment manifest for safety, completeness, and best practices given the provided code.
        If the manifest is perfect, respond with only 'PASS'.
        If it is flawed, provide a list of critiques and end your response with 'FAIL'.
      user_prompt_template: |
        Implementation Code:
        ```python
        {code}
        ```
        
        Generated Artifact:
        {artifact}
        
        Review the manifest.
